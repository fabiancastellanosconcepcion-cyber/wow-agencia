<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/x-icon" href="/favicon.ico" />
<link rel="icon" type="image/png" sizes="512x512" href="/ICON.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/ICON.png" />
<meta name="theme-color" content="#0F2D6B" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceder · Academia WoW</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue-deep:#0F2D6B;
  --blue-mid:#1B4FAB;
  --blue-accent:#90B8F8;
  --white:#ffffff;
  --glass:rgba(255,255,255,0.05);
  --glass-border:rgba(144,184,248,0.15);
  --error:#FF6B6B;
  --success:#6BCB77;
}
html,body{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--blue-deep);
  color:var(--white);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;position:relative;overflow:hidden;
}
.bg-grid{
  position:fixed;inset:0;
  background-image:linear-gradient(rgba(144,184,248,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(144,184,248,0.04) 1px,transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);
  -webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 0%,transparent 100%);
  pointer-events:none;
}
.bg-orb{
  position:fixed;width:600px;height:600px;left:50%;top:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(27,79,171,0.4) 0%,transparent 65%);
  border-radius:50%;pointer-events:none;
  animation:pulse 5s ease-in-out infinite;
}
nav{
  position:fixed;top:0;left:0;right:0;
  padding:1.1rem 5%;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(15,45,107,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--glass-border);z-index:10;
}
.nav-logo{
  font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;
  letter-spacing:0.05em;color:var(--white);text-decoration:none;
}
.nav-logo span{color:var(--blue-accent)}
.nav-back{
  color:rgba(255,255,255,0.6);text-decoration:none;font-size:0.9rem;
  display:flex;align-items:center;gap:0.4rem;transition:color 0.2s;
}
.nav-back:hover{color:var(--blue-accent)}

.login-box{
  position:relative;z-index:2;
  background:var(--glass);border:1px solid var(--glass-border);
  border-radius:24px;padding:2.5rem 2rem;
  width:100%;max-width:400px;
  animation:fadeUp 0.5s ease both;
  margin:1rem;
}
.login-icon{
  width:56px;height:56px;border-radius:16px;
  background:rgba(144,184,248,0.1);border:1px solid var(--glass-border);
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;color:var(--blue-accent);
  margin:0 auto 1.5rem;
}
.login-box h1{
  font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;
  text-align:center;margin-bottom:0.4rem;
}
.login-box p{text-align:center;color:rgba(255,255,255,0.5);font-size:0.9rem;margin-bottom:2rem}

.form-group{margin-bottom:1.2rem}
.form-group label{
  display:block;font-size:0.85rem;font-weight:500;
  color:rgba(255,255,255,0.7);margin-bottom:0.5rem;
}
.form-group input{
  width:100%;background:rgba(255,255,255,0.06);
  border:1px solid var(--glass-border);border-radius:12px;
  padding:0.85rem 1rem;color:var(--white);font-size:0.95rem;
  font-family:'DM Sans',sans-serif;
  transition:border-color 0.2s,background 0.2s;outline:none;
}
.form-group input:focus{
  border-color:var(--blue-accent);background:rgba(144,184,248,0.07);
}
.form-group input::placeholder{color:rgba(255,255,255,0.3)}
.input-wrap{position:relative}
.input-wrap input{padding-right:3rem}
.toggle-pw{
  position:absolute;right:1rem;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,0.4);
  cursor:pointer;font-size:0.9rem;transition:color 0.2s;padding:0;
}
.toggle-pw:hover{color:var(--blue-accent)}

.btn-login{
  width:100%;background:var(--blue-accent);color:var(--blue-deep);
  padding:0.95rem;border-radius:12px;border:none;cursor:pointer;
  font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;
  transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:0.5rem;
  margin-top:0.5rem;
}
.btn-login:hover:not(:disabled){background:var(--white);transform:translateY(-1px);box-shadow:0 6px 24px rgba(144,184,248,0.3)}
.btn-login:disabled{opacity:0.6;cursor:not-allowed}

.msg{
  padding:0.8rem 1rem;border-radius:10px;font-size:0.88rem;
  margin-top:1rem;display:none;align-items:center;gap:0.5rem;
}
.msg.error{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3);color:#FF9999;display:flex}
.msg.success{background:rgba(107,203,119,0.1);border:1px solid rgba(107,203,119,0.3);color:#6BCB77;display:flex}

.login-footer{
  text-align:center;margin-top:1.5rem;
  font-size:0.85rem;color:rgba(255,255,255,0.4);
}
.login-footer a{color:var(--blue-accent);text-decoration:none}
.login-footer a:hover{text-decoration:underline}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:0.7;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(15,45,107,0.4);border-top-color:var(--blue-deep);border-radius:50%;animation:spin 0.7s linear infinite}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb"></div>

<nav>
  <a href="/" class="nav-logo">W<span>o</span>W <span style="color:rgba(255,255,255,0.45);font-weight:400">Agencia</span></a>
  <a href="/academia.html" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Academia WoW</a>
</nav>

<div class="login-box">
  <div class="login-icon"><i class="fa-solid fa-graduation-cap"></i></div>
  <h1>Accede a tu curso</h1>
  <p>Ingresa con las credenciales que te enviamos</p>

  <div class="form-group">
    <label for="email">Correo electrónico</label>
    <input type="email" id="email" placeholder="tu@correo.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label for="password">Contraseña</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
      <button class="toggle-pw" id="togglePw" type="button" aria-label="Mostrar contraseña">
        <i class="fa-solid fa-eye" id="eyeIcon"></i>
      </button>
    </div>
  </div>

  <div class="msg" id="msg"></div>

  <button class="btn-login" id="loginBtn">
    <i class="fa-solid fa-right-to-bracket"></i> Entrar al curso
  </button>

  <div class="login-footer">
    ¿Problemas para acceder? <a href="https://wa.me/5359394935?text=Hola%2C%20no%20puedo%20acceder%20a%20mi%20curso%20UGC" target="_blank">Escríbenos por WhatsApp</a>
  </div>
</div>

<script>
// ── CONFIGURA AQUÍ TUS CLAVES DE SUPABASE ──
const SUPABASE_URL = 'https://zqkofhreflxkspsbzqxl.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpxa29maHJlZmx4a3Nwc2J6cXhsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NDgzMjksImV4cCI6MjA5NzAyNDMyOX0.F2hKBE164i0dADK9MZGr4-rul7wFxuwHYnKAPDHy-4E';
// ────────────────────────────────────────────

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Redirigir si ya está logueado
sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = '/portal.html';
});

const emailEl = document.getElementById('email');
const passwordEl = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const msgEl = document.getElementById('msg');
const togglePw = document.getElementById('togglePw');
const eyeIcon = document.getElementById('eyeIcon');

togglePw.addEventListener('click', () => {
  const isText = passwordEl.type === 'text';
  passwordEl.type = isText ? 'password' : 'text';
  eyeIcon.className = isText ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
});

function showMsg(text, type) {
  msgEl.textContent = text;
  msgEl.className = 'msg ' + type;
  msgEl.style.display = 'flex';
}

loginBtn.addEventListener('click', async () => {
  const email = emailEl.value.trim();
  const password = passwordEl.value;
  if (!email || !password) { showMsg('Por favor completa todos los campos.', 'error'); return; }

  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="spinner"></span> Verificando…';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    loginBtn.disabled = false;
    loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Entrar al curso';
    showMsg('Correo o contraseña incorrectos. ¿Necesitas ayuda? Escríbenos por WhatsApp.', 'error');
  } else {
    showMsg('¡Acceso correcto! Redirigiendo…', 'success');
    setTimeout(() => window.location.href = '/portal.html', 1000);
  }
});

// Enter key
[emailEl, passwordEl].forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });
});
</script>
</body>
</html>
