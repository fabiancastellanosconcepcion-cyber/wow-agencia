    <h3>Por qué necesitas un contrato aunque seas principiante</h3>
    <p>Un contrato no es solo para grandes creadores. Es para cualquier persona que entregue trabajo a cambio de dinero o productos. Sin contrato, no tienes forma de exigir el pago, no puedes controlar cómo usan tu contenido, y no tienes prueba de lo que se acordó.</p>
    <div class="highlight">💡 Un contrato simple de una sola página protege tu trabajo, tu tiempo y tu dinero. Las marcas serias lo esperan. Las marcas dudosas lo evitan — y eso ya te dice algo.</div>
    <h3>¿Qué son los derechos de uso?</h3>
    <p>Cuando creas un video o foto para una marca, tú eres la autora. La marca puede usarlo — pero solo en los términos que acuerden. Los derechos de uso determinan:</p>
    <ul>
      <li><strong>Dónde:</strong> ¿Solo en Instagram orgánico? ¿En anuncios pagados (Meta Ads, TikTok Ads)? ¿En su sitio web? ¿En tiendas físicas?</li>
      <li><strong>Por cuánto tiempo:</strong> 3 meses, 6 meses, 1 año, o de forma indefinida.</li>
      <li><strong>En qué territorios:</strong> Solo su país, toda Latinoamérica, a nivel mundial.</li>
    </ul>
    <h3>¿Por qué importa tanto?</h3>
    <p>El precio de un video cambia completamente según los derechos. Un video para uso orgánico puede valer $50. El mismo video con derechos para anuncios pagados en todo el mundo por 1 año puede valer $200 o más. Muchos creadores principiantes entregan sus videos sin especificar esto — y las marcas los usan en anuncios, ganando miles de dólares, mientras el creador cobró como si fuera un post casual.</p>
    <div class="highlight">⚠️ Regla de oro: Si la marca va a usar tu contenido en anuncios pagados, cobra entre 2 y 3 veces más que tu tarifa estándar.</div>
    <h3>Qué debe incluir un contrato básico UGC</h3>
    <ul>
      <li><strong>Datos de ambas partes:</strong> Tu nombre/empresa y el de la marca.</li>
      <li><strong>Descripción del trabajo:</strong> Cuántos videos, duración, formato, plataforma.</li>
      <li><strong>Fecha de entrega:</strong> Cuándo entregas el borrador y cuándo el final.</li>
      <li><strong>Revisiones incluidas:</strong> Cuántas rondas de cambios están cubiertas (lo estándar es 1 o 2).</li>
      <li><strong>Derechos de uso:</strong> Dónde, por cuánto tiempo, en qué territorios.</li>
      <li><strong>Forma de pago:</strong> Cuándo y cómo pagas (50% antes, 50% al entregar es lo más común).</li>
      <li><strong>Qué pasa si cancelan:</strong> Si la marca cancela después de que empezaste, ¿cobras algo?</li>
    </ul>
    <h3>¿Dónde conseguir una plantilla?</h3>
    <p>Busca en Google: "UGC contract template free". Sitios como Honeybook, Hello Bonsai o el blog de Later tienen plantillas gratuitas en inglés. Puedes traducirlas y adaptarlas. Lo importante es que cubra los puntos anteriores.</p>
    <h3>¿Cómo se firma?</h3>
    <p>Para proyectos pequeños, un correo donde ambas partes confirman los términos por escrito puede ser suficiente. Para proyectos más grandes, usa DocuSign (gratuito para documentos básicos) o simplemente firmen el PDF a mano y lo envíen escaneado.</p>
    <div class="highlight">🎯 Desde tu próxima colaboración pagada, incluye aunque sea un correo formal donde confirmes: qué entregas, cuándo, qué derechos tiene la marca y cuánto te pagan. Eso es el 80% de la protección que necesitas.</div>
  `

  title: 'Hooks y guiones que convierten: la habilidad #1 del UGC',
  duration: 'Lectura',
  videoId: null,
  content: `
    <h3>¿Qué es un hook y por qué lo es todo?</h3>
    <p>El hook es el primer segundo o dos de tu video. Si no captura la atención de inmediato, el usuario hace scroll y el algoritmo penaliza el video. Las marcas lo saben — por eso cuando evalúan a un creador UGC, lo primero que revisan es la apertura del video.</p>
    <div class="highlight">🎣 Un video con mal hook y buen contenido falla. Un video con buen hook y contenido regular funciona. El hook es lo más importante que puedes aprender a dominar.</div>
    <h3>Tipos de hooks que funcionan en 2025-2026</h3>
    <ul>
      <li><strong>El "ojalá lo hubiera sabido antes":</strong> "Desearía haber conocido esto antes de gastar $200 en skincare."</li>
      <li><strong>La contradicción:</strong> "Odio los suplementos. Pero este cambió todo."</li>
      <li><strong>El número específico:</strong> "Probé este producto durante 14 días. Esto pasó."</li>
      <li><strong>La pregunta directa:</strong> "¿Realmente funciona? Lo probé por ti."</li>
      <li><strong>El suspenso:</strong> "Lo que nadie te dice sobre este producto..."</li>
      <li><strong>La identificación:</strong> "Si tu piel se irrita con todo como la mía, escucha esto."</li>
      <li><strong>El resultado primero:</strong> Muestra el resultado final antes de explicar cómo llegaste ahí.</li>
    </ul>
    <h3>Estructura de guión básica para UGC</h3>
    <ul>
      <li><strong>Segundos 0-3 (Hook):</strong> La frase o imagen que para el scroll.</li>
      <li><strong>Segundos 3-8 (Problema):</strong> Con qué situación se identifica la audiencia.</li>
      <li><strong>Segundos 8-20 (Solución):</strong> El producto entra como respuesta.</li>
      <li><strong>Segundos 20-35 (Demostración):</strong> Lo muestras, lo usas, lo describes.</li>
      <li><strong>Segundos 35-45 (Resultado):</strong> Qué cambió o mejoró.</li>
      <li><strong>Segundos 45-60 (CTA):</strong> Qué debe hacer quien está viendo.</li>
    </ul>
    <h3>Ejemplo de guión completo (60 segundos)</h3>
    <div class="highlight">
      <strong>Hook:</strong> "Este sérum arruinó todos los que usé antes."<br>
      <strong>Problema:</strong> "Llevo años buscando algo que realmente hidrate sin dejar mi piel brillosa."<br>
      <strong>Solución:</strong> "Lo probé por 3 semanas y no puedo creer la diferencia."<br>
      <strong>Demo:</strong> [Mostrar textura, aplicación, resultado visible]<br>
      <strong>Resultado:</strong> "Mi piel está más uniforme, más suave, y ya no necesito retoque a las 2 horas."<br>
      <strong>CTA:</strong> "El link está en la bio si quieres probarlo."
    </div>
    <h3>Errores en los hooks que debes evitar</h3>
    <ul>
      <li>Comenzar presentándote: "Hola, soy [nombre]..." — nadie espera eso.</li>
      <li>Comenzar con el nombre del producto — no genera curiosidad.</li>
      <li>Hook genérico: "Hoy les voy a hablar de..." — predecible y aburrido.</li>
      <li>Hablar demasiado lento en los primeros segundos.</li>
    </ul>
    <div class="highlight">🎯 Práctica esta semana: Escribe 5 hooks diferentes para el mismo producto. Elige el más fuerte. Repite con el próximo. En un mes vas a notar la diferencia.</div>
  `
},

    <p>En lugar de ser tú quien graba todos los videos, actúas como intermediaria entre las marcas (que necesitan contenido) y los creadores (que producen el contenido). Tu margen es la diferencia entre lo que cobra el creador y lo que paga la marca.</p>

    <h3>¿Qué es un brief?</h3>
    <p>Es el documento que la marca te envía explicando qué necesita. Puede ser un PDF de 5 páginas o un mensaje de WhatsApp de 3 líneas. En ambos casos, tu trabajo es extraer toda la información relevante antes de grabar un solo segundo.</p>
    <div class="highlight">⚠️ El 80% de las revisiones innecesarias ocurren porque el creador no leyó bien el brief. Cada revisión extra te cuesta tiempo y daña tu reputación.</div>

    <h3>Lo que siempre debe estar en un brief (y qué hacer si falta)</h3>
    <ul>
      <li><strong>Descripción del producto:</strong> Qué es, qué hace, cuál es su beneficio principal. Si no está claro, pregunta: "¿Cuál es el beneficio número uno que quieren comunicar?"</li>
      <li><strong>Público objetivo:</strong> A quién va dirigido el video. Mujer de 25–35 con piel sensible es diferente a hombre de 30–45 que hace ejercicio. El tono cambia completamente.</li>
      <li><strong>Tono y estilo:</strong> ¿Divertido, serio, educativo, aspiracional, cercano? Si no lo especifican, mira su feed y pregunta: "¿Se parece más al video X o al video Y de su cuenta?"</li>
      <li><strong>Duración y formato:</strong> 15 segundos, 30 segundos, 60 segundos. Vertical 9:16, cuadrado 1:1. Especificaciones técnicas.</li>
      <li><strong>Mensajes clave:</strong> Frases o puntos que sí o sí deben aparecer en el video. Algunos briefs te dan el guión completo. Otros te dan libertad creativa.</li>
      <li><strong>Lo que NO quieren:</strong> Mencionar a la competencia, ciertos colores, palabras que no pueden usar. Siempre pregunta si hay restricciones.</li>
      <li><strong>Fecha de entrega:</strong> Del borrador y del video final aprobado. Son fechas distintas.</li>
      <li><strong>Cómo entregar:</strong> Google Drive, WeTransfer, link de Dropbox, directamente en la plataforma.</li>
    </ul>

    <h3>Preguntas que debes hacer ANTES de grabar</h3>
    <ul>
      <li>"¿Tienen algún ejemplo de video que les haya funcionado bien y pueda usar como referencia?"</li>
      <li>"¿El video es para uso orgánico, para anuncios pagados o ambos?"</li>
      <li>"¿Cuántas revisiones incluye este proyecto?"</li>
      <li>"¿El guión lo propongo yo o me lo envían ustedes?"</li>
    </ul>

    <h3>Cómo confirmar que entendiste el brief</h3>
    <p>Antes de grabar, envía un resumen de lo que vas a hacer. Ejemplo:</p>
    <div class="highlight">
      "Hola [Nombre], para confirmar que estamos alineadas: voy a grabar un video de 30 segundos en formato vertical, mostrando [beneficio del producto], con tono cercano y natural, enfocado en [público objetivo]. El gancho será [tu idea de hook]. ¿Todo correcto o hay algo que ajustar antes de comenzar?"
    </div>
    <p>Este mensaje te protege. Si la marca aprueba y luego dice que no era lo que quería, tienes por escrito que confirmaron.</p>

    <h3>Errores frecuentes al ejecutar un brief</h3>
    <ul>
      <li>Improvisar sin leer el brief completo primero.</li>
      <li>Ignorar las restricciones (mencionar algo que dijeron que no).</li>
      <li>Cambiar el tono sin avisar ("lo vi muy serio y lo hice más divertido").</li>
      <li>Entregar en formato o duración incorrectos.</li>
      <li>No preguntar las dudas antes — esperar a que la marca señale los errores.</li>
    </ul>

    <div class="highlight">🎯 Regla de oro: Un brief bien ejecutado a la primera vale más que diez videos creativos que no siguen las instrucciones. La confiabilidad es tu diferencial más poderoso.</div>
  `

  title: 'Por qué el UGC funciona: psicología del consumidor aplicada',
  duration: 'Lectura',
  videoId: null,
  content: `
    <h3>No es solo un video. Es psicología.</h3>
    <p>El UGC no funciona por accidente. Funciona porque activa mecanismos psicológicos profundos que llevan al ser humano a confiar, a desear y a comprar. Entender esto te convierte en una creadora estratégica, no solo en alguien que graba videos bonitos.</p>

    <h3>1. Prueba social (Social Proof)</h3>
    <p>Las personas miran lo que hacen otras personas para decidir qué es correcto hacer. Si ven que alguien como ellas usa y recomienda un producto, asumen que probablemente es bueno. Por eso un testimonio de una persona real convence más que un anuncio con actores perfectos.</p>
    <div class="highlight">💡 Cuanto más se parezca el creador al consumidor ideal de la marca, más poderoso es el UGC. Una mujer de 28 años con piel mixta convence más a mujeres con piel mixta que una modelo con piel "perfecta".</div>

    <h3>2. El principio de semejanza</h3>
    <p>Confiamos más en personas que se parecen a nosotros. Mismo acento, mismo contexto, mismos problemas. Por eso el UGC de una persona "normal" muchas veces supera en resultados a una campaña millonaria con celebridades. Tu "ordinariness" es tu superpoder.</p>

    <h3>3. Autenticidad percibida</h3>
    <p>El cerebro humano detecta la falsedad muy rápido. Los anuncios perfectamente producidos activan una alerta inconsciente: "esto me están vendiendo". El UGC desactiva esa alerta porque parece una recomendación genuina, no publicidad. Las pequeñas imperfecciones — luz no perfecta, pausa natural, reacción espontánea — aumentan la credibilidad.</p>

    <h3>4. Efecto de escasez y urgencia</h3>
    <p>Los CTAs efectivos en UGC usan este principio: "Se me estaba acabando y tuve que reordenar", "Lo probé solo porque estaba en oferta y no lo suelto más", "No sé cuánto tiempo va a durar este precio". No se trata de mentir — se trata de ser honesta sobre experiencias reales que crean urgencia genuina.</p>

    <h3>5. Relaciones parasociales</h3>
    <p>Cuando alguien te ve hablar directamente a la cámara de forma cercana y consistente, el cerebro empieza a procesar esa relación como si fuera una amistad real. Por eso las recomendaciones de creadores de contenido se sienten como consejos de un amigo — no como publicidad. Y los consejos de amigos tienen un peso enorme en las decisiones de compra.</p>

    <h3>6. El principio de reciprocidad</h3>
    <p>Cuando un creador comparte información útil, un truco, una experiencia real — el espectador siente de forma inconsciente que "recibió algo". Eso lo predispone positivamente hacia lo que ese creador recomiende después. Por eso los mejores videos UGC no empiezan vendiendo — empiezan aportando valor.</p>

    <h3>Cómo aplicar esto en tus videos</h3>
    <ul>
      <li>Muestra el problema real antes de mostrar el producto — activa la identificación.</li>
      <li>Habla en primera persona y con emoción genuina — activa la confianza.</li>
      <li>Incluye un detalle imperfecto — activa la autenticidad percibida.</li>
      <li>Usa un CTA con urgencia natural — "lo sigo usando porque realmente funciona" convierte más que "compra ahora".</li>
    </ul>

    <div class="highlight">🎯 La próxima vez que veas un anuncio que te haga querer comprar algo, analízalo: ¿qué principio psicológico está activando? Esa conciencia es lo que separa a una creadora intuitiva de una creadora estratégica.</div>
  `
},

  content: `
    <h3>Por qué las métricas te consiguen clientes recurrentes</h3>
    <p>La mayoría de las creadoras entregan el video y desaparecen. Las creadoras profesionales hacen algo diferente: hacen seguimiento de los resultados y los reportan. Esa diferencia convierte una colaboración única en un contrato mensual.</p>
    <div class="highlight">💡 Si puedes mostrarle a una marca que tu video generó X visualizaciones, Y% de retención y Z clics, eres indispensable. Si solo entregas el archivo sin datos, eres reemplazable.</div>

    <h3>Métricas que debes conocer y entender</h3>
    <ul>
      <li><strong>Visualizaciones / Reproducciones:</strong> Cuántas veces se vio el video. Indica alcance, no conversión.</li>
      <li><strong>Tasa de retención:</strong> Qué porcentaje del video vieron los usuarios en promedio. Si es mayor al 50%, el contenido engancha. Si cae antes del 30%, el hook no funciona.</li>
      <li><strong>CTR (Click-Through Rate):</strong> Porcentaje de personas que hicieron clic en el enlace o botón de compra. El indicador más importante para UGC de paid ads.</li>
      <li><strong>Engagement rate:</strong> Likes + comentarios + compartidos ÷ visualizaciones. Un 3–5% es bueno. Más de 8% es excelente.</li>
      <li><strong>Conversiones:</strong> Cuántas personas compraron, se registraron o tomaron la acción que la marca quería. La métrica final que más le importa a la marca.</li>
      <li><strong>Saves / Guardados:</strong> En Instagram, un guardado indica que el contenido tiene valor real. Es una de las señales más positivas del algoritmo.</li>
    </ul>

    <h3>Métricas según el tipo de UGC</h3>
    <ul>
      <li><strong>UGC orgánico (publicado en tu cuenta):</strong> Reportas visualizaciones, retención, engagement rate y comentarios relevantes.</li>
      <li><strong>UGC para paid ads (publicado por la marca):</strong> La marca normalmente maneja estas métricas. Puedes preguntarles cómo funcionó — esa información fortalece tu portafolio.</li>
      <li><strong>UGC entregado sin publicar (solo el archivo):</strong> Aquí no tienes acceso a métricas propias. Pregunta a la marca si pueden compartir los resultados una vez que lo usen.</li>
    </ul>

    <h3>Cómo hacer un reporte simple que impresione a una marca</h3>
    <p>No tiene que ser complicado. Un mensaje o PDF con esto es suficiente:</p>
    <div class="highlight">
      "Hola [Nombre], quería compartirles los resultados del video que publicamos el [fecha]:<br><br>
      📊 Visualizaciones: 12,400<br>
      ⏱️ Retención promedio: 62%<br>
      ❤️ Engagement rate: 5.8%<br>
      💬 Comentarios destacados: [cita 2–3 comentarios positivos]<br><br>
      Fue un placer trabajar con ustedes. Si en algún momento necesitan más contenido, con gusto continuamos. 🙏"
    </div>

    <h3>¿Qué hacer si los resultados no fueron buenos?</h3>
    <p>Sé honesta y proactiva. Di qué crees que no funcionó y qué harías diferente. Las marcas valoran más a alguien que aprende y propone soluciones que a alguien que desaparece cuando los números no son perfectos.</p>

    <div class="highlight">🎯 Desde tu próxima colaboración donde publiques en tu cuenta, guarda los datos a los 7 días y a los 30 días. Con el tiempo, tendrás un historial de resultados que es tu argumento más poderoso para cobrar más.</div>
  `

    <h3>Situación 1: Revisiones infinitas</h3>
    <p>La marca te pide cambio tras cambio aunque el contrato dice "2 revisiones incluidas".</p>
    <div class="highlight">
      ✅ Cómo responder:<br>
      "Hola [Nombre], con gusto hago ese ajuste. Quiero avisarles que hemos superado las 2 revisiones incluidas en el proyecto. Cualquier cambio adicional tiene un costo de $[X]. ¿Confirman que quieren continuar con ese ajuste?"
    </div>
    <p>Dilo sin drama y sin disculparte. Es un límite profesional normal. Las marcas serias lo entienden. Las que se molestan por esto probablemente habrían seguido pidiendo cambios gratis indefinidamente.</p>

    <h3>Situación 2: La marca no paga</h3>
    <p>Entregaste el trabajo pero el pago no llega.</p>
    <ul>

      <li><strong>Día 7:</strong> Mensaje más directo: "Quiero confirmar el estado del pago del proyecto [X] que fue entregado el [fecha]. El plazo acordado fue [fecha]. Por favor confírmenmelo."</li>
      <li><strong>Día 14:</strong> Notifica que pausas cualquier trabajo futuro hasta resolver el pendiente. Si tienes contrato, menciónalo.</li>
      <li><strong>Lección para el futuro:</strong> Cobra siempre el 50% antes de empezar con clientes nuevos. Nunca entregues el archivo final sin haber recibido el pago completo.</li>

    <div class="highlight">
      ✅ Cómo responder:<br>
      "Entiendo el cambio de dirección. El video actual fue producido siguiendo el brief original que confirmamos el [fecha]. Para producir un video con el nuevo enfoque, necesitaría tratarlo como un proyecto nuevo con su costo correspondiente. ¿Cómo prefieren proceder?"

    <h3>Situación 5: Una marca cancela después de que empezaste</h3>
    <p>Por eso existe la cláusula de cancelación en el contrato. Si ya trabajaste, tienes derecho a cobrar por el tiempo invertido. Lo estándar es quedarte con el 50% del pago si cancela una vez iniciado el proyecto.</p>

    <h3>Señales de alerta: marcas con las que mejor no trabajar</h3>

    <h3>Tu diccionario de referencia</h3>
    <p>Guarda esta lección. Cuando una marca o plataforma use un término que no conozcas, aquí lo encuentras.</p>

    <h3>A</h3>
    <ul>
      <li><strong>Afiliado / Affiliate:</strong> Persona que recibe una comisión por recomendar un producto usando un enlace o código personalizado.</li>
      <li><strong>Ads (Anuncios pagados):</strong> Publicidad que una marca paga para distribuir en plataformas como Meta, TikTok o Google. El UGC para ads es el tipo mejor pagado.</li>
      <li><strong>Aspire / Aspire IQ:</strong> Plataforma que conecta marcas con creadores UGC e influencers.</li>
    </ul>

    <h3>B</h3>
    <ul>
      <li><strong>B-roll:</strong> Tomas secundarias que acompañan el video principal. Ejemplo: manos usando el producto, close-up de la textura, el empaque. Dan dinamismo al video sin necesitar que aparezcas en pantalla todo el tiempo.</li>
      <li><strong>Brief:</strong> Documento que la marca te envía con las instrucciones del proyecto: qué grabar, cómo, para qué plataforma, en qué tono y para cuándo.</li>
      <li><strong>Billo:</strong> Plataforma UGC especializada en video, muy usada para paid ads.</li>
    </ul>

    <h3>C</h3>
    <ul>

      <li><strong>Meta Ads:</strong> Sistema de anuncios pagados de Facebook e Instagram (Meta). Una de las principales plataformas donde se usa UGC para paid ads.</li>

    <h3>O</h3>
    <ul>
      <li><strong>Orgánico:</strong> Contenido que se publica en las redes de la marca sin inversión en publicidad pagada. Más barato de licenciar que el uso en ads.</li>
      <li><strong>Outreach:</strong> La acción de contactar marcas de forma proactiva para proponer una colaboración.</li>

    <h3>P</h3>
    <ul>
      <li><strong>Paid ads / Paid media:</strong> Publicidad pagada en plataformas digitales. Cuando tu UGC se usa en ads, la tarifa aumenta.</li>
      <li><strong>Portafolio / Portfolio:</strong> Colección de tus mejores trabajos UGC que muestras a las marcas para demostrar tu capacidad.</li>
      <li><strong>PR (Public Relations):</strong> En el contexto UGC, se refiere al envío de productos por parte de una marca para que los reseñes.</li>

    <h3>R</h3>
    <ul>
      <li><strong>Rate Card:</strong> Documento con tus servicios y precios. Tu "menú" profesional.</li>
      <li><strong>Retención:</strong> Porcentaje del video que los usuarios ven en promedio. Alta retención = contenido que engancha.</li>
      <li><strong>ROI (Return on Investment):</strong> Retorno sobre la inversión. Las marcas miden si el dinero gastado en UGC generó más ventas.</li>

    <h3>S</h3>

    <h3>El unboxing: el formato más solicitado en UGC</h3>
    <p>El unboxing es el video donde muestras la apertura de un producto por primera vez, con reacción genuina. Es uno de los formatos más pedidos por las marcas porque combina tres elementos que generan ventas: curiosidad, prueba social y experiencia de usuario real.</p>
    <div class="highlight">💡 El 62% de los consumidores mira videos de unboxing antes de hacer una compra online. Las marcas lo saben — por eso pagan bien por este formato.</div>

    <h3>La estructura de un unboxing que convierte</h3>
    <ul>
      <li><strong>Segundos 0–3 (Hook):</strong> No empieces mostrando la caja cerrada en silencio. Empieza con una frase que genere expectativa. Ejemplos:<br>
        "Llevaba meses queriendo probar esto y por fin llegó."<br>
        "Me mandaron el producto del que todo el mundo está hablando."<br>
        "Pedí esto hace 3 semanas y finalmente llegó — veamos si valió la pena."</li>
      <li><strong>Segundos 3–10 (Presentación del empaque):</strong> Muestra la caja o el empaque. Comenta el packaging — si es bonito, dilo. Si es sencillo, dilo también. La autenticidad importa más que el elogio.</li>
      <li><strong>Segundos 10–25 (La apertura):</strong> Abre lentamente. No cortes esta parte — la gente quiere ver el momento. Comenta en tiempo real lo que ves, hueles o tocas.</li>
      <li><strong>Segundos 25–45 (Primera impresión):</strong> ¿Qué sientes al sostenerlo? ¿Cómo es la textura, el olor, el peso? Las marcas quieren que el espectador sienta que está ahí contigo.</li>
      <li><strong>Segundos 45–60 (CTA):</strong> "El link está en bio", "Lo voy a probar esta semana y cuento cómo me fue", "Si quieres saber si vale la pena, sigue mi cuenta."</li>
    </ul>

    <h3>Cómo filmarlo con el teléfono</h3>
    <ul>
      <li><strong>Ángulo principal:</strong> Cámara a la altura de tu cara o ligeramente por encima. No filmes desde abajo.</li>
      <li><strong>Toma de manos (B-roll):</strong> Filma también un plano cerrado de tus manos abriendo el producto. Lo usas en la edición para darle dinamismo.</li>
      <li><strong>Iluminación:</strong> Cerca de una ventana o con aro de luz frontal. El producto debe verse claramente — evita sombras sobre él.</li>
      <li><strong>Fondo:</strong> Limpio y neutro. Un fondo desordenado distrae del producto.</li>
      <li><strong>Sonido:</strong> Si el producto hace algún sonido al abrirse — papel crujiente, clic de cierre, burbuja de aire — no lo cortes. Ese sonido genera satisfacción en el espectador.</li>
    </ul>

    <h3>Errores comunes en unboxings que debes evitar</h3>
    <ul>
      <li>❌ Empezar con la caja ya abierta — pierde todo el efecto de sorpresa.</li>
      <li>❌ Silencio total durante la apertura — comenta en tiempo real.</li>
      <li>❌ Reacción exagerada y falsa — el espectador lo detecta inmediatamente.</li>
      <li>❌ No mostrar todos los elementos que vienen en la caja — los espectadores quieren ver todo.</li>
      <li>❌ Video demasiado largo — un unboxing efectivo no necesita más de 60–90 segundos.</li>
      <li>❌ No mencionar ningún beneficio del producto — no es solo "abrir la caja", es conectar la experiencia con el valor del producto.</li>

    <p>Si estás construyendo tu portafolio y no tienes productos de marcas aún, puedes hacer unboxings de productos que ya tienes en casa. Un perfume, una crema, un gadget, un libro. Lo importante es practicar el formato — la marca con la que apliques no sabe que no te lo enviaron ellos.</p>

    <div class="highlight">💡 Una marca puede perdonar un error. Casi nunca perdona la falta de responsabilidad o la desaparición después del error.</div>

    <h3>Situación 1: Entregaste tarde</h3>
    <p>Lo primero que debes hacer es avisar antes de que se venza el plazo, no después. Si ves que no vas a llegar a tiempo, escribe con al menos 24 horas de anticipación:</p>

      "Hola [Nombre], quiero avisarles con anticipación que el proyecto necesitará [X días adicionales] por [razón breve y honesta]. Les confirmo la nueva fecha de entrega: [fecha]. Disculpen el inconveniente y gracias por su comprensión."
    </div>
    <p>Si ya se venció el plazo sin avisar, escribe igualmente — tarde es mejor que nunca. Asume la responsabilidad sin excusas excesivas y da una fecha concreta.</p>

    <h3>Situación 2: El video no siguió el brief</h3>
    <p>Antes de que la marca lo señale, revisa el brief contra tu video entregado. Si detectas tú misma el error, escribe inmediatamente:</p>
    <div class="highlight">

  content: `
    <h3>Los límites no son obstáculos. Son parte de tu marca.</h3>
    <p>Una de las cosas que más diferencia a una creadora que dura en este negocio de una que se agota y abandona es la capacidad de establecer límites claros desde el principio. Los límites no te hacen difícil de trabajar — te hacen predecible y profesional.</p>
    <div class="highlight">💡 Las marcas serias respetan los límites. Las que no los respetan te están mostrando cómo va a ser toda la relación de trabajo.</div>

    <h3>Límites de comunicación</h3>
    <ul>
      <li><strong>Horario de respuesta:</strong> Define en qué horas respondes mensajes de trabajo. No tienes que estar disponible las 24 horas. Ejemplo: "Respondo mensajes de lunes a viernes de 9am a 7pm." Puedes incluirlo en tu media kit o mencionarlo al inicio de cada colaboración.</li>
      <li><strong>Canal de comunicación preferido:</strong> ¿Correo, WhatsApp, DM? Elige uno principal y comunícalo. Mezclar canales genera confusión y mensajes perdidos.</li>
      <li><strong>Tiempo de respuesta realista:</strong> Si estás en Cuba y la conectividad es limitada, es completamente válido aclarar desde el principio: "Mi tiempo de respuesta habitual es de 24 horas hábiles."</li>
    </ul>

    <h3>Límites de contenido</h3>
    <p>Decide con anticipación qué tipo de contenido no vas a producir, independientemente de cuánto paguen. Esto incluye:</p>
    <ul>
      <li>Productos o marcas que van en contra de tus valores personales.</li>
      <li>Contenido que requiera afirmaciones falsas o engañosas sobre un producto.</li>
      <li>Categorías con las que no te sientes cómoda — contenido político, productos controvertidos, etc.</li>
      <li>Situaciones donde te pidan mostrar más de lo que quieres mostrar de tu vida personal.</li>
    </ul>
    <p>No tienes que explicar en detalle por qué. Un "ese tipo de contenido no está dentro de mis servicios" es suficiente y profesional.</p>

    <h3>Límites de precio</h3>
    <ul>
      <li>Define tu tarifa mínima y no la bajes por presión. Si una marca no puede pagarte lo que vales ahora mismo, no es el cliente correcto para ahora mismo.</li>
      <li>Establece cuántos proyectos puedes manejar simultáneamente sin sacrificar calidad. Cuando llegas a ese límite, dices no a nuevos proyectos — aunque sean tentadores.</li>
    </ul>

    <h3>Límites de revisiones</h3>
    <p>Ya lo cubrimos en otras lecciones, pero vale repetirlo aquí: el número de revisiones incluidas en cada proyecto debe estar claro antes de empezar. Nunca después. Una vez que lo acuerdas, cumplirlo es un límite que protege tu tiempo y tu energía.</p>

    <h3>Cómo comunicar un límite sin perder la colaboración</h3>
    <p>Los límites no tienen que sonar como conflicto. Pueden sonar así:</p>
    <div class="highlight">
      "Ese tipo de ajuste no está incluido en el paquete acordado, pero con gusto lo resolvemos con un pequeño adicional."<br><br>
      "Respondo mensajes hasta las 7pm — cualquier cosa que llegue después la atiendo a primera hora del día siguiente."<br><br>
      "Ese tipo de contenido no está dentro de mis servicios, pero puedo ofrecerte [alternativa] que creo que puede funcionar igual de bien."
    </div>

    <h3>El límite más importante: tu energía</h3>
    <p>El UGC puede volverse agotador si dices sí a todo, a toda hora, a cualquier precio. La sostenibilidad de tu negocio depende de que protejas tu energía creativa. Un creador agotado produce contenido mediocre. Y el contenido mediocre no genera colaboraciones recurrentes.</p>

    <div class="highlight">🎯 Ejercicio: Escribe ahora mismo tres límites que vas a establecer en tu negocio UGC. Uno de comunicación, uno de contenido y uno de precio. Guárdalos. La próxima vez que sientas que los estás cruzando, léelos.</div>
  `

    <h3>El mercado UGC no se detiene</h3>
    <p>Los formatos que funcionaban hace dos años ya no convierten igual. Los algoritmos cambian, la atención del usuario evoluciona y las marcas ajustan sus estrategias constantemente. Conocer las tendencias actuales te da una ventaja real sobre creadoras que siguen haciendo lo mismo de siempre.</p>

    <h3>Tendencia 1: Raw y sin filtros (Lo imperfecto convierte más)</h3>
    <p>El contenido ultra producido está perdiendo efectividad. Lo que está funcionando en 2025–2026 es lo que parece grabado en el momento, sin preparación excesiva — grabaciones en el carro, en la cocina, con luz imperfecta. Las marcas llaman a esto "raw UGC" y muchas lo están pidiendo específicamente en sus briefs.</p>
    <div class="highlight">💡 "Imperfecto a propósito" es ahora una habilidad que las marcas buscan. Saber cuándo NO editar demasiado es tan valioso como saber editar bien.</div>

    <h3>Tendencia 2: POV Videos (Point of View)</h3>
    <p>Videos grabados desde la perspectiva del usuario, como si el espectador estuviera viviendo la experiencia. "POV: recibes el paquete que llevas semanas esperando." "POV: tu rutina de skincare de las 6am." Este formato genera inmersión y conexión emocional muy efectiva.</p>

    <h3>Tendencia 3: Deinfluencing</h3>
    <p>Contenido donde el creador dice honestamente que un producto NO vale la pena o que hay alternativas mejores. Puede parecer contradictorio para UGC pagado, pero muchas marcas lo usan de forma inteligente: "probé 5 productos de esta categoría y solo uno realmente funciona — este." La honestidad sobre lo que no funciona hace que la recomendación de lo que sí funciona sea más creíble.</p>

    <h3>Tendencia 4: Storytelling extendido</h3>
    <p>Videos de 60–90 segundos donde el creador cuenta una historia completa con el producto como parte del relato. No es un anuncio — es una experiencia. "Estaba pasando por un momento muy difícil y encontré este producto que..." Las marcas están pagando más por este formato porque convierte mejor que los videos puramente demostrativos.</p>

    <h3>Tendencia 5: UGC con texto en pantalla sin voz</h3>
    <p>Videos donde el mensaje se comunica completamente a través de texto animado en pantalla, sin que el creador hable. Funciona perfectamente para el 85% de usuarios que consumen contenido sin sonido. Es también ideal para creadoras que no se sienten cómodas hablando a cámara todavía.</p>

    <h3>Tendencia 6: Series de contenido para una misma marca</h3>
    <p>En lugar de un video único, las marcas están contratando a creadoras para producir series de 3 a 6 videos que cuentan una historia progresiva. "Semana 1 con el producto", "Semana 2: primeros resultados", "Semana 4: conclusión honesta". Este formato genera contenido recurrente y contratos más largos.</p>

    <h3>Tendencia 7: UGC generado con IA como complemento</h3>
    <p>Las marcas están usando herramientas de IA para generar variaciones de guiones y hooks, pero siguen necesitando creadoras reales para grabarlos. La IA no reemplaza la cara humana — optimiza el proceso detrás de ella. Creadoras que entienden cómo trabajar con briefs generados por IA tienen ventaja.</p>

    <h3>Lo que está perdiendo fuerza</h3>
    <ul>
      <li>Videos demasiado pulidos que parecen anuncios tradicionales.</li>

      <li>Contenido sin subtítulos — ya es casi un requisito básico.</li>

  document.getElementById('affiliateLink').value = 'https://wowcreativa.com/academia.html?ref=' + studentData.referral_code;
  document.getElementById('affiliateBox').style.display = 'block';
}
  buildSidebar();
  loadLesson(0);
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  let lastModule = '';
  LESSONS.forEach((l, i) => {
    if (l.module !== lastModule) {
      lastModule = l.module;
    }
    const done = completed.includes(l.id);
    const li = document.createElement('li');
    li.innerHTML = `<a href="#" data-idx="${i}" class="${i===0?'active':''}">
      <i class="fa-solid ${done ? 'fa-circle-check' : 'fa-circle'}" style="${done ? 'color:#6BCB77' : ''}"></i>
      <span style="line-height:1.3;font-size:0.85rem">${l.title}</span>
    </a>`;
    li.querySelector('a').addEventListener('click', e => { e.preventDefault(); loadLesson(i); });
    nav.appendChild(li);
  });
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((completed.length / LESSONS.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function loadLesson(idx) {
  currentLesson = idx;
  const l = LESSONS[idx];
  const isDone = completed.includes(l.id);

  // Update sidebar active
  document.querySelectorAll('#sidebarNav a').forEach((a, i) => {
    a.classList.toggle('active', i === idx);
  });

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');

  const videoHtml = l.videoId
    ? `<iframe src="https://www.youtube.com/embed/${l.videoId}?rel=0&modestbranding=1" allowfullscreen title="${l.title}"></iframe>`
    : `<div class="video-placeholder"><i class="fa-solid fa-film"></i><p>Video disponible próximamente</p></div>`;

  document.getElementById('contentArea').innerHTML = `
    <div class="lesson-header">
      <p class="lesson-eyebrow">${l.module}</p>
      <h1 class="lesson-title">${l.title}</h1>
      <div class="lesson-meta">
        <span><i class="fa-regular fa-clock"></i> ${l.duration}</span>
        ${isDone ? '<span style="color:#6BCB77"><i class="fa-solid fa-circle-check"></i> Completada</span>' : ''}
      </div>
    </div>

    <div class="video-wrap">${videoHtml}</div>

    <div class="lesson-body">${l.content}</div>

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem">
      <button class="done-btn ${isDone?'marked':''}" id="doneBtn">
        <i class="fa-solid fa-${isDone?'circle-check':'circle'}"></i>
        ${isDone ? 'Clase completada' : 'Marcar como completada'}
      </button>
    </div>

    <div class="lesson-nav">
      <button class="btn-nav" id="prevBtn" ${idx===0?'disabled':''}>
        <i class="fa-solid fa-arrow-left"></i> Anterior
      </button>
      <button class="btn-nav primary" id="nextBtn" ${idx===LESSONS.length-1?'disabled':''}>
        ${idx===LESSONS.length-1 ? '<i class="fa-solid fa-flag-checkered"></i> Curso completado' : 'Siguiente <i class="fa-solid fa-arrow-right"></i>'}
      </button>
    </div>

    <div class="support-box">
      <i class="fa-brands fa-whatsapp"></i>
      <div>
        <p>¿Tienes alguna duda sobre esta clase?</p>
        <small>Escríbenos directamente y te respondemos</small>
      </div>
      <a href="https://wa.me/5359394935?text=Hola%2C%20tengo%20una%20duda%20sobre%20el%20curso%20UGC%3A%20${encodeURIComponent(l.title)}" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-whatsapp"></i> Preguntar
      </a>
    </div>
  `;

  document.getElementById('doneBtn').addEventListener('click', () => toggleDone(l.id));
  document.getElementById('prevBtn').addEventListener('click', () => { if(idx>0) loadLesson(idx-1); });
  document.getElementById('nextBtn').addEventListener('click', () => { if(idx<LESSONS.length-1) loadLesson(idx+1); });

  window.scrollTo({top:0, behavior:'smooth'});
}

function toggleDone(id) {
  if (completed.includes(id)) {
    completed = completed.filter(x => x !== id);
  } else {
    completed.push(id);
  }
  localStorage.setItem('wow_ugc_completed', JSON.stringify(completed));
  buildSidebar();
  loadLesson(currentLesson);
}

// Logout
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await sb.auth.signOut();
  window.location.href = '/login.html';
});

// Mobile sidebar
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
});
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
});

init();
function copyAffiliateLink() {
  const input = document.getElementById('affiliateLink');
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = document.getElementById('copyLinkBtn');
    btn.innerHTML = '<i class="fa-solid fa-check"></i> Copiado';
    btn.style.color = '#6BCB77';
    btn.style.borderColor = '#6BCB77';
    setTimeout(() => {
      btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copiar';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  });
}
</script>
</body>
</html>
