*{margin:0;padding:0;box-sizing:border-box}
:root{
  --blue-deep:#0F2D6B;
  --blue-mid:#1B4FAB;
  --blue-accent:#90B8F8;
  --white:#ffffff;

body{

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;background:var(--blue-deep);
  display:flex;align-items:center;justify-content:center;
  z-index:999;
}
.loading-inner{text-align:center}
.loading-inner .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.5rem;color:var(--blue-accent);margin-bottom:1rem}
.loading-bar{width:200px;height:3px;background:rgba(144,184,248,0.15);border-radius:2px;margin:0 auto;overflow:hidden}
.loading-bar-fill{height:100%;background:var(--blue-accent);border-radius:2px;animation:loadBar 1.2s ease both}
@keyframes loadBar{from{width:0}to{width:100%}}

/* ── LAYOUT ── */
#app{display:none}
.layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar);flex-shrink:0;
  background:rgba(15,45,107,0.95);
  border-right:1px solid var(--glass-border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;
  z-index:50;transition:transform 0.3s;
}
.sidebar-logo{
  padding:1.5rem 1.2rem 1rem;
  border-bottom:1px solid var(--glass-border);
}
.sidebar-logo a{
  font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;
  color:var(--white);text-decoration:none;
}
.sidebar-logo a span{color:var(--blue-accent)}
.sidebar-label{
  padding:1.2rem 1.2rem 0.5rem;
  font-size:0.7rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:rgba(255,255,255,0.3);
}
.sidebar-nav{list-style:none;padding:0 0.7rem;flex:1;overflow-y:auto}
.sidebar-nav li a,.sidebar-nav li button{
  display:flex;align-items:center;gap:0.7rem;
  padding:0.7rem 0.8rem;border-radius:10px;
  color:rgba(255,255,255,0.6);text-decoration:none;font-size:0.9rem;
  transition:all 0.2s;width:100%;text-align:left;
  background:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;
}
.sidebar-nav li a:hover,.sidebar-nav li button:hover{
  background:var(--glass);color:var(--white);
}
.sidebar-nav li a.active{
  background:rgba(144,184,248,0.12);color:var(--blue-accent);
  border:1px solid rgba(144,184,248,0.2);
}
.sidebar-nav li a i,.sidebar-nav li button i{width:18px;text-align:center;font-size:0.85rem}
.sidebar-progress{
  padding:1rem 1.2rem;border-top:1px solid var(--glass-border);
}
.progress-label{font-size:0.78rem;color:rgba(255,255,255,0.5);margin-bottom:0.5rem;display:flex;justify-content:space-between}
.progress-bar{height:4px;background:rgba(144,184,248,0.15);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue-accent);border-radius:2px;transition:width 0.5s ease}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:var(--sidebar);right:0;
  height:60px;padding:0 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(15,45,107,0.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--glass-border);z-index:40;
}
.topbar-title{font-family:'Syne',sans-serif;font-weight:700;font-size:1rem}
.topbar-right{display:flex;align-items:center;gap:1rem}
.user-badge{
  display:flex;align-items:center;gap:0.5rem;
  font-size:0.85rem;color:rgba(255,255,255,0.7);
}
.user-avatar{
  width:32px;height:32px;border-radius:50%;
  background:rgba(144,184,248,0.2);border:1px solid var(--glass-border);

  font-size:0.8rem;color:var(--blue-accent);font-weight:600;
}

}
.btn-logout:hover{border-color:rgba(255,107,107,0.4);color:#FF9999}

/* hamburger mobile */
.menu-toggle{
  display:none;background:none;border:none;color:var(--white);
  font-size:1.2rem;cursor:pointer;

/* ── MAIN CONTENT ── */

.content-area{padding:2rem 2rem 3rem}

.btn-nav.primary:hover{background:var(--white)}

/* ── WHATSAPP SUPPORT ── */

/* ── RESPONSIVE ── */
.sidebar-overlay{

  .menu-toggle{display:block}

let currentLesson = 0;
let completed = JSON.parse(localStorage.getItem('wow_ugc_completed') || '[]');

// ── AUTH CHECK ──
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = '/login.html';
    return;
  }

  // Mostrar app
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Usuario
  const email = session.user.email;
  document.getElementById('userEmail').textContent = email;
  document.getElementById('avatarInitial').textContent = email[0].toUpperCase();

  buildSidebar();
  loadLesson(0);
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  let lastModule = '';
  LESSONS.forEach((l, i) => {
    if (l.module !== lastModule) {
      lastModule = l.module;
    }
    const done = completed.includes(l.id);
    const li = document.createElement('li');
    li.innerHTML = `<a href="#" data-idx="${i}" class="${i===0?'active':''}">
      <i class="fa-solid ${done ? 'fa-circle-check' : 'fa-circle'}" style="${done ? 'color:#6BCB77' : ''}"></i>
      <span style="line-height:1.3;font-size:0.85rem">${l.title}</span>
    </a>`;
    li.querySelector('a').addEventListener('click', e => { e.preventDefault(); loadLesson(i); });
    nav.appendChild(li);
  });
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((completed.length / LESSONS.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function loadLesson(idx) {
  currentLesson = idx;
  const l = LESSONS[idx];
  const isDone = completed.includes(l.id);

  // Update sidebar active
  document.querySelectorAll('#sidebarNav a').forEach((a, i) => {
    a.classList.toggle('active', i === idx);
  });

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');

  const videoHtml = l.videoId
    ? `<iframe src="https://www.youtube.com/embed/${l.videoId}?rel=0&modestbranding=1" allowfullscreen title="${l.title}"></iframe>`
    : `<div class="video-placeholder"><i class="fa-solid fa-film"></i><p>Video disponible próximamente</p></div>`;

  document.getElementById('contentArea').innerHTML = `
    <div class="lesson-header">
      <p class="lesson-eyebrow">${l.module}</p>
      <h1 class="lesson-title">${l.title}</h1>
      <div class="lesson-meta">
        <span><i class="fa-regular fa-clock"></i> ${l.duration}</span>
        ${isDone ? '<span style="color:#6BCB77"><i class="fa-solid fa-circle-check"></i> Completada</span>' : ''}
      </div>
    </div>

    <div class="video-wrap">${videoHtml}</div>

    <div class="lesson-body">${l.content}</div>

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem">
      <button class="done-btn ${isDone?'marked':''}" id="doneBtn">
        <i class="fa-solid fa-${isDone?'circle-check':'circle'}"></i>
        ${isDone ? 'Clase completada' : 'Marcar como completada'}
      </button>
    </div>

    <div class="lesson-nav">
      <button class="btn-nav" id="prevBtn" ${idx===0?'disabled':''}>
        <i class="fa-solid fa-arrow-left"></i> Anterior
      </button>
      <button class="btn-nav primary" id="nextBtn" ${idx===LESSONS.length-1?'disabled':''}>
        ${idx===LESSONS.length-1 ? '<i class="fa-solid fa-flag-checkered"></i> Curso completado' : 'Siguiente <i class="fa-solid fa-arrow-right"></i>'}
      </button>
    </div>

    <div class="support-box">
      <i class="fa-brands fa-whatsapp"></i>
      <div>
        <p>¿Tienes alguna duda sobre esta clase?</p>
        <small>Escríbenos directamente y te respondemos</small>
      </div>
      <a href="https://wa.me/5359394935?text=Hola%2C%20tengo%20una%20duda%20sobre%20el%20curso%20UGC%3A%20${encodeURIComponent(l.title)}" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-whatsapp"></i> Preguntar
      </a>
    </div>
  `;

  document.getElementById('doneBtn').addEventListener('click', () => toggleDone(l.id));
  document.getElementById('prevBtn').addEventListener('click', () => { if(idx>0) loadLesson(idx-1); });
  document.getElementById('nextBtn').addEventListener('click', () => { if(idx<LESSONS.length-1) loadLesson(idx+1); });

  window.scrollTo({top:0, behavior:'smooth'});
}

function toggleDone(id) {
  if (completed.includes(id)) {
    completed = completed.filter(x => x !== id);
  } else {
    completed.push(id);
  }
  localStorage.setItem('wow_ugc_completed', JSON.stringify(completed));
  buildSidebar();
  loadLesson(currentLesson);
}

// Logout
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await sb.auth.signOut();
  window.location.href = '/login.html';
});

// Mobile sidebar
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
});
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
});

init();
</script>
</body>
</html>
