    <h3>Por qué necesitas un contrato aunque seas principiante</h3>

    <p>Cuando creas un video o foto para una marca, tú eres la autora. La marca puede usarlo — pero solo en los términos que acuerden. Los derechos de uso determinan:</p>

    <h3>¿Por qué importa tanto?</h3>

let currentLesson = 0;
let completed = JSON.parse(localStorage.getItem('wow_ugc_completed') || '[]');

// ── AUTH CHECK ──
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) {
    window.location.href = '/login.html';
    return;
  }

  // Mostrar app
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Usuario
  const email = session.user.email;
  document.getElementById('userEmail').textContent = email;
  document.getElementById('avatarInitial').textContent = email[0].toUpperCase();
  const { data: studentData } = await sb
  .from('students')
  .select('referral_code, commission_earned, commission_paid')
  .eq('email', email)
  .single();

if (studentData?.referral_code) {
  document.getElementById('affiliateCode').textContent = studentData.referral_code;
  document.getElementById('affiliateEarned').textContent = '$' + (studentData.commission_earned || 0);
  document.getElementById('affiliatePaid').textContent = '$' + (studentData.commission_paid || 0);
  document.getElementById('affiliateLink').value = 'https://wowcreativa.com/academia.html?ref=' + studentData.referral_code;
  document.getElementById('affiliateBox').style.display = 'block';
}
  buildSidebar();
  loadLesson(0);
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = '';
  let lastModule = '';
  LESSONS.forEach((l, i) => {
    if (l.module !== lastModule) {
      lastModule = l.module;
    }
    const done = completed.includes(l.id);
    const li = document.createElement('li');
    li.innerHTML = `<a href="#" data-idx="${i}" class="${i===0?'active':''}">
      <i class="fa-solid ${done ? 'fa-circle-check' : 'fa-circle'}" style="${done ? 'color:#6BCB77' : ''}"></i>
      <span style="line-height:1.3;font-size:0.85rem">${l.title}</span>
    </a>`;
    li.querySelector('a').addEventListener('click', e => { e.preventDefault(); loadLesson(i); });
    nav.appendChild(li);
  });
  updateProgress();
}

function updateProgress() {
  const pct = Math.round((completed.length / LESSONS.length) * 100);
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
}

function loadLesson(idx) {
  currentLesson = idx;
  const l = LESSONS[idx];
  const isDone = completed.includes(l.id);

  // Update sidebar active
  document.querySelectorAll('#sidebarNav a').forEach((a, i) => {
    a.classList.toggle('active', i === idx);
  });

  // Close mobile sidebar
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');

  const videoHtml = l.videoId
    ? `<iframe src="https://www.youtube.com/embed/${l.videoId}?rel=0&modestbranding=1" allowfullscreen title="${l.title}"></iframe>`
    : `<div class="video-placeholder"><i class="fa-solid fa-film"></i><p>Video disponible próximamente</p></div>`;

  document.getElementById('contentArea').innerHTML = `
    <div class="lesson-header">
      <p class="lesson-eyebrow">${l.module}</p>
      <h1 class="lesson-title">${l.title}</h1>
      <div class="lesson-meta">
        <span><i class="fa-regular fa-clock"></i> ${l.duration}</span>
        ${isDone ? '<span style="color:#6BCB77"><i class="fa-solid fa-circle-check"></i> Completada</span>' : ''}
      </div>
    </div>

    <div class="video-wrap">${videoHtml}</div>

    <div class="lesson-body">${l.content}</div>

    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem">
      <button class="done-btn ${isDone?'marked':''}" id="doneBtn">
        <i class="fa-solid fa-${isDone?'circle-check':'circle'}"></i>
        ${isDone ? 'Clase completada' : 'Marcar como completada'}
      </button>
    </div>

    <div class="lesson-nav">
      <button class="btn-nav" id="prevBtn" ${idx===0?'disabled':''}>
        <i class="fa-solid fa-arrow-left"></i> Anterior
      </button>
      <button class="btn-nav primary" id="nextBtn" ${idx===LESSONS.length-1?'disabled':''}>
        ${idx===LESSONS.length-1 ? '<i class="fa-solid fa-flag-checkered"></i> Curso completado' : 'Siguiente <i class="fa-solid fa-arrow-right"></i>'}
      </button>
    </div>

    <div class="support-box">
      <i class="fa-brands fa-whatsapp"></i>
      <div>
        <p>¿Tienes alguna duda sobre esta clase?</p>
        <small>Escríbenos directamente y te respondemos</small>
      </div>
      <a href="https://wa.me/5359394935?text=Hola%2C%20tengo%20una%20duda%20sobre%20el%20curso%20UGC%3A%20${encodeURIComponent(l.title)}" target="_blank" rel="noopener noreferrer">
        <i class="fa-brands fa-whatsapp"></i> Preguntar
      </a>
    </div>
  `;

  document.getElementById('doneBtn').addEventListener('click', () => toggleDone(l.id));
  document.getElementById('prevBtn').addEventListener('click', () => { if(idx>0) loadLesson(idx-1); });
  document.getElementById('nextBtn').addEventListener('click', () => { if(idx<LESSONS.length-1) loadLesson(idx+1); });

  window.scrollTo({top:0, behavior:'smooth'});
}

function toggleDone(id) {
  if (completed.includes(id)) {
    completed = completed.filter(x => x !== id);
  } else {
    completed.push(id);
  }
  localStorage.setItem('wow_ugc_completed', JSON.stringify(completed));
  buildSidebar();
  loadLesson(currentLesson);
}

// Logout
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await sb.auth.signOut();
  window.location.href = '/login.html';
});

// Mobile sidebar
document.getElementById('menuToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
});
document.getElementById('overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
});

init();
function copyAffiliateLink() {
  const input = document.getElementById('affiliateLink');
  navigator.clipboard.writeText(input.value).then(() => {
    const btn = document.getElementById('copyLinkBtn');
    btn.innerHTML = '<i class="fa-solid fa-check"></i> Copiado';
    btn.style.color = '#6BCB77';
    btn.style.borderColor = '#6BCB77';
    setTimeout(() => {
      btn.innerHTML = '<i class="fa-solid fa-copy"></i> Copiar';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  });
}
</script>
